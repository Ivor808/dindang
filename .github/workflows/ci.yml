name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dindang_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Verify schema migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dindang_test
        run: |
          # Push current schema to test DB
          npx drizzle-kit push --force

          # Generate migrations from current schema — should produce nothing
          # if the schema file and DB are in sync
          npx drizzle-kit generate 2>&1 | tee /tmp/generate-output.txt

          # Check if any new migration files were generated
          if find src/db/migrations -name '*.sql' -newer package.json 2>/dev/null | grep -q .; then
            echo "::error::Schema and database are out of sync. Run 'npx drizzle-kit generate' and commit the migration."
            exit 1
          fi
