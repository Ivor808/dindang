services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dindang
    volumes:
      - dindang-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  dindang:
    # Pre-built image (uncomment after first push to ghcr.io):
    # image: ghcr.io/runa/dindang:latest
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/dindang
      DINDANG_MODE: local
      DINDANG_CALLBACK_URL: http://host.docker.internal:3000
      DINDANG_DOCKER_NETWORK: dindang_default
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dindang-secrets:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  dindang-data:
  dindang-secrets:
